name: "sonar_cloud_scan_github_actions"
on:
  workflow_dispatch: #ordem do fluxo quando feito manual

jobs:
  DemoSonarCloudSCan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
            fetch-depth: 0
      - name: SonarCloud Scan #nome da task nome da API
        uses: sonarsource/sonarcloud-github-action@master
        env:
            GITHUB_TOKEN: ${{ secrets.GIT_TOKEN }}
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
        # precisamos pegar a ssinatura da sua conta
        #nome do repositorio
          args: >
              -Dsonar.organization=larissa-dma
              -Dsonar.projectKey=controle-presenca
              -Dsonar.python.coverage.reportPaths=coverage.xml
              -Dsonar.python.version=3.10
              -Dsonar.sources=src
              -Dsonar.tests=tests
              -Dsonar.sourceEncoding=UTF-8
